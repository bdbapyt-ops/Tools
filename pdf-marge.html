<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge PDF Online Free – Fast & Secure PDF Combiner</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#2563eb,#7c3aed);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

:root{
    --primary:#2563eb;
    --muted:#777;
}

.container{
width:100%;
max-width:900px;
background:#fff;
border-radius:20px;
padding:clamp(20px,4vw,40px);
box-shadow:0 15px 35px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:10px;
}

p{
text-align:center;
color:#666;
margin-bottom:25px;
}

.upload{
border:3px dashed var(--primary);
border-radius:15px;
padding:clamp(18px,4vw,36px);
text-align:center;
cursor:pointer;
transition:.3s;
display:flex;
align-items:center;
justify-content:center;
gap:16px;
flex-wrap:wrap;
}

.upload:hover{
background:#f2f6ff;
}

.upload i{
font-size:50px;
display:block;
margin-bottom:10px;
}

.upload h3{
margin-bottom:8px;
}

.upload > div{
    font-size:clamp(40px,8vw,80px);
    display:block;
}
.upload h3{
    margin-bottom:8px;
    font-size:clamp(16px,1.6vw,22px);
}
.upload span{
    color:var(--muted);
    font-size:clamp(12px,1.2vw,16px);
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#f8f8f8;
border-radius:10px;
margin-bottom:10px;
gap:12px;
flex-wrap:wrap;
}

.name{
font-size:clamp(14px,1.3vw,18px);
font-weight:bold;
overflow:hidden;
text-overflow:ellipsis;
white-space:normal;
max-width:calc(100% - 120px);
}

.remove{
background:#ef4444;
color:#fff;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

.remove:hover{
background:#dc2626;
}

button.merge{
width:100%;
margin-top:20px;
padding:clamp(12px,2.2vw,18px);
border:none;
background:var(--primary);
color:#fff;
font-size:clamp(15px,1.8vw,18px);
border-radius:12px;
cursor:pointer;
transition:.3s;
}

button.merge:hover{
background:#1d4ed8;
}

#status{
margin-top:15px;
text-align:center;
font-weight:bold;
color:#16a34a;
}

footer{
text-align:center;
margin-top:25px;
color:#777;
font-size:13px;
}

@media(max-width:600px){

.container{
padding:16px;
}

.item{
flex-direction:column;
gap:10px;
}

.name{
max-width:100%;
text-align:center;
}

}

@media (max-width:900px){
    .name{ max-width:100%; }
    .remove{ width:100%; }
}

@media (min-width:1200px){
    .container{ max-width:1100px; }
}
</style>

</head>
<body>

<div class="container">

<h1>📄 PDF Merge Tool</h1>

<p>Merge multiple PDF files instantly.</p>

<label class="upload">

<input type="file"
id="files"
multiple
accept=".pdf">

<div style="font-size:55px;">📁</div>

<h3>Select PDF Files</h3>

<span>Click here to choose multiple PDF files</span>

</label>

<div id="list"></div>

<button class="merge" id="mergeBtn">

Merge PDFs

</button>

<div id="status"></div>

<footer>

© 2026 EG Tools Online

</footer>

</div>

<script>

let pdfFiles=[];

const input=document.getElementById("files");

const list=document.getElementById("list");

const status=document.getElementById("status");

input.addEventListener("change",()=>{

pdfFiles=[...pdfFiles,...input.files];

renderList();

input.value="";

});

function renderList(){

list.innerHTML="";

pdfFiles.forEach((file,index)=>{

const div=document.createElement("div");

div.className="item";

div.innerHTML=`

<div class="name">

${index+1}. ${file.name}

</div>

<button class="remove"

onclick="removeFile(${index})">

Remove

</button>

`;

list.appendChild(div);

});

}

function removeFile(i){

pdfFiles.splice(i,1);

renderList();

}
document.getElementById("mergeBtn").addEventListener("click", async () => {

    if (pdfFiles.length < 2) {
        alert("Please select at least 2 PDF files.");
        return;
    }

    try {

        status.style.color = "#2563eb";
        status.innerHTML = "Merging PDFs... Please wait.";

        const mergedPdf = await PDFLib.PDFDocument.create();

        for (const file of pdfFiles) {

            const bytes = await file.arrayBuffer();

            const pdf = await PDFLib.PDFDocument.load(bytes);

            const copiedPages = await mergedPdf.copyPages(
                pdf,
                pdf.getPageIndices()
            );

            copiedPages.forEach(page => mergedPdf.addPage(page));

        }

        const mergedBytes = await mergedPdf.save();

        const blob = new Blob(
            [mergedBytes],
            { type: "application/pdf" }
        );

        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");

        a.href = url;

        a.download = "merged.pdf";

        document.body.appendChild(a);

        a.click();

        a.remove();

        URL.revokeObjectURL(url);

        status.style.color = "#16a34a";
        status.innerHTML = "✅ PDF merged successfully.";

    } catch (err) {

        console.error(err);

        status.style.color = "#dc2626";
        status.innerHTML = "❌ Failed to merge PDF files.";

    }

});

</script>

</body>
</html>
